# SynCAN Configuration (overrides default.yaml)
model:
  n_features: 20
  n_heads: 10  # d_model=40 must be divisible by n_heads (40/10=4)
  window_size: 100
  n_encoder_layers: 1
  n_decoder_layers: 1
  d_feedforward: 8
  dropout: 0.1
  use_layer_norm: false

training:
  epochs: 5
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.00001
  scheduler_step: 5
  scheduler_gamma: 0.95
  dtype: "float32"
  loss_weighting: "exponential_decay"
  epsilon: 1.01
  adversarial_loss: false
  gradient_clip_norm: 1.0
  early_stopping_patience: 0
  val_split: 0.1
  max_epochs: 5

scoring:
  threshold_method: "pot"
  percentile: 99
  pot_risk_level: 0.01
  scoring_mode: "averaged"

data:
  dataset: "syncan"
  raw_dir: "data/syncan/raw"
  processed_dir: "data/syncan/processed"
