# SynCAN Configuration (overrides default.yaml)
model:
  n_features: 20
  n_heads: 10  # d_model=40 must be divisible by n_heads (40/10=4)
  window_size: 100
  n_encoder_layers: 1
  n_decoder_layers: 1
  d_feedforward: 16
  dropout: 0.1
  use_layer_norm: false

training:
  epochs: 5
  batch_size: 128
  learning_rate: 0.0001
  weight_decay: 0.00001
  scheduler_step: 5
  scheduler_gamma: 0.9
  dtype: "float32"
  loss_weighting: "epoch_inverse"
  epsilon: 1.01
  adversarial_loss: false
  gradient_clip_norm: 1.0
  early_stopping_patience: 3
  val_split: 0.1
  max_epochs: 30

scoring:
  threshold_method: "pot"
  percentile: 99
  pot_risk_level: 0.001
  scoring_mode: "phase2_only"

data:
  dataset: "syncan"
  raw_dir: "data/syncan/raw"
  processed_dir: "data/syncan/processed"
